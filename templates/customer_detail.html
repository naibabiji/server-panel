{{template "base" .}}
{{define "customer_detail_content"}}
<div x-data="customerDetail()" class="p-6 max-w-6xl">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="text-lg font-semibold text-gray-100" x-text="customer.name || '加载中...'"></h2>
            <div class="text-sm text-gray-500" x-text="customer.company || customer.contact_person || '--'"></div>
        </div>
        <div class="flex gap-2">
            <a :href="customer.id ? customer.id + '/edit' : '#'" class="btn-secondary text-sm">编辑</a>
            <a href=".." class="text-sm text-gray-400 hover:text-white">返回列表</a>
        </div>
    </div>

    <section class="border border-[#2a3038] bg-[#171b21] mb-5" x-show="loading" x-cloak>
        <div class="px-5 py-4 border-b border-[#202833] bg-[#181e26]"><div class="skeleton-block h-4 w-24"></div></div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-5">
            <div class="skeleton-block h-4"></div>
            <div class="skeleton-block h-4"></div>
            <div class="skeleton-block h-4"></div>
            <div class="skeleton-block h-4"></div>
            <div class="skeleton-block h-4"></div>
            <div class="skeleton-block h-4"></div>
        </div>
    </section>

    <section class="border border-[#2a3038] bg-[#171b21] mb-5" x-show="!loading">
        <div class="px-5 py-4 border-b border-[#202833] bg-[#181e26] text-base font-semibold text-gray-100">客户信息</div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-0">
            <dl class="p-5 text-sm space-y-3 border-b md:border-b-0 md:border-r border-[#202833]">
                <div class="flex"><dt class="w-24 text-gray-400">名称</dt><dd class="text-gray-200" x-text="customer.name || '--'"></dd></div>
                <div class="flex"><dt class="w-24 text-gray-400">联系人</dt><dd class="text-gray-200" x-text="customer.contact_person || '--'"></dd></div>
                <div class="flex"><dt class="w-24 text-gray-400">电话</dt><dd class="text-gray-200" x-text="customer.phone || '--'"></dd></div>
                <div class="flex"><dt class="w-24 text-gray-400">邮箱</dt><dd><a :href="mailURL()" class="text-blue-400 hover:text-blue-300 break-all" x-text="customer.email || '--'"></a></dd></div>
            </dl>
            <dl class="p-5 text-sm space-y-3">
                <div class="flex"><dt class="w-24 text-gray-400">公司</dt><dd class="text-gray-200" x-text="customer.company || '--'"></dd></div>
                <div class="flex"><dt class="w-24 text-gray-400">开始日期</dt><dd class="text-gray-200" x-text="customer.start_date || '--'"></dd></div>
                <div class="flex"><dt class="w-24 text-gray-400">地址</dt><dd class="text-gray-200" x-text="customer.address || '--'"></dd></div>
            </dl>
        </div>
        <div class="p-5 border-t border-[#202833]" x-show="customer.notes">
            <div class="text-sm text-gray-400 mb-2">备注</div>
            <p class="text-sm text-gray-300 whitespace-pre-wrap" x-text="customer.notes"></p>
        </div>
    </section>

    <section class="border border-[#2a3038] bg-[#171b21] mb-5">
        <div class="px-5 py-4 border-b border-[#202833] bg-[#181e26] text-base font-semibold text-gray-100">服务器资源</div>
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead><tr>
                    <th class="table-header">名称</th><th class="table-header">IP</th><th class="table-header">服务商</th><th class="table-header">状态</th><th class="table-header">到期日</th>
                </tr></thead>
                <tbody>
                <template x-for="s in servers" :key="s.id">
                    <tr class="border-t border-[#202833] hover:bg-[#1d232b]">
                        <td class="table-cell text-white"><a :href="serverURL(s.id)" class="hover:text-purple-200" x-text="s.name"></a></td>
                        <td class="table-cell text-gray-400" x-text="s.ip_address || '--'"></td>
                        <td class="table-cell"><a :href="providerURL(s)" class="text-blue-400 hover:text-blue-300" x-text="s.provider_name || '--'"></a></td>
                        <td class="table-cell"><span :class="s.status=='active'?'badge-success':'badge-danger'" x-text="s.status=='active'?'活跃':'过期'"></span></td>
                        <td class="table-cell text-gray-400" x-text="s.expiry_date || '--'"></td>
                    </tr>
                </template>
                </tbody>
            </table>
            <div class="text-center text-gray-500 py-8 text-sm" x-show="!loadingServers && servers.length==0">暂无服务器资源</div>
        </div>
    </section>

    <section class="border border-[#2a3038] bg-[#171b21]">
        <div class="px-5 py-4 border-b border-[#202833] bg-[#181e26] text-base font-semibold text-gray-100">网站资源</div>
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead><tr>
                    <th class="table-header">名称</th><th class="table-header">域名</th><th class="table-header">服务器</th><th class="table-header">状态</th><th class="table-header">到期日</th>
                </tr></thead>
                <tbody>
                <template x-for="w in websites" :key="w.id">
                    <tr class="border-t border-[#202833] hover:bg-[#1d232b]">
                        <td class="table-cell text-white"><a :href="websiteURL(w.id)" class="hover:text-purple-200" x-text="w.name || w.domain"></a></td>
                        <td class="table-cell"><a :href="externalURL(w.domain)" target="_blank" rel="noopener noreferrer" class="text-blue-400 hover:text-blue-300 break-all" x-text="w.domain"></a></td>
                        <td class="table-cell"><a :href="websiteServerURL(w)" class="text-blue-400 hover:text-blue-300" x-text="w.server_name || '--'"></a></td>
                        <td class="table-cell"><span :class="w.status=='active'?'badge-success':'badge-danger'" x-text="w.status=='active'?'运行中':'已到期'"></span></td>
                        <td class="table-cell text-gray-400" x-text="w.expiry_date || '--'"></td>
                    </tr>
                </template>
                </tbody>
            </table>
            <div class="text-center text-gray-500 py-8 text-sm" x-show="!loadingWebsites && websites.length==0">暂无网站资源</div>
        </div>
    </section>
</div>
<script>
function customerDetail() {
    return {
        customer: {}, loading: true, servers: [], websites: [], loadingServers: true, loadingWebsites: true,
        async init() {
            const id = window.location.pathname.split('/').filter(Boolean).pop();
            try { const d = await api('/api/customers/' + id); this.customer = d.data; }
            catch(e) { this.loading = false; this.loadingServers = false; this.loadingWebsites = false; showToast(e.message, 'error'); return; }
            this.loading = false;
            await Promise.all([this.fetchServers(), this.fetchWebsites()]);
        },
        async fetchServers() {
            this.loadingServers = true;
            try { const d = await api('/api/servers?customer_id=' + this.customer.id + '&page_size=100'); this.servers = d.data.items || []; }
            catch(e) { showToast(e.message || '加载服务器资源失败', 'error'); }
            finally { this.loadingServers = false; }
        },
        async fetchWebsites() {
            this.loadingWebsites = true;
            try { const d = await api('/api/websites?customer_id=' + this.customer.id + '&page_size=100'); this.websites = d.data.items || []; }
            catch(e) { showToast(e.message || '加载网站资源失败', 'error'); }
            finally { this.loadingWebsites = false; }
        },
        mailURL() {
            return this.customer.email ? 'mailto:' + this.customer.email : '#';
        },
        serverURL(id) {
            return (document.body.dataset.panelPrefix || '') + '/servers/' + id;
        },
        websiteURL(id) {
            return (document.body.dataset.panelPrefix || '') + '/websites/' + id;
        },
        providerURL(server) {
            if (!server || !server.provider_id) return '#';
            return (document.body.dataset.panelPrefix || '') + '/providers/' + server.provider_id;
        },
        websiteServerURL(w) {
            if (!w || !w.server_id) return '#';
            return (document.body.dataset.panelPrefix || '') + '/servers/' + w.server_id;
        },
        externalURL(domain) {
            if (!domain) return '#';
            if (/^https?:\/\//i.test(domain)) return domain;
            return 'https://' + domain;
        }
    }
}
</script>
{{end}}
