{{template "base" .}}
{{define "customer_list_content"}}
<div x-data="customerList()" x-init="fetch()" class="p-6">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
        <input type="text" x-model="search" @input="resetAndFetch()" placeholder="搜索..." class="input-field w-48">
        <a href="customers/new" class="btn-primary text-sm">添加客户</a>
    </div>
    <div class="border border-[#2a3038] bg-[#171b21] overflow-x-auto">
        <table class="w-full">
            <thead><tr>
                <th class="table-header">名称</th><th class="table-header">联系人</th><th class="table-header">邮箱</th>
                <th class="table-header">公司</th><th class="table-header">服务器数量</th><th class="table-header">网站数量</th><th class="table-header">操作</th>
            </tr></thead>
            <tbody>
            <template x-for="u in items" :key="u.id">
                <tr class="border-t border-[#202833] hover:bg-[#1d232b]">
                    <td class="table-cell text-white"><a :href="'customers/'+u.id" class="hover:text-purple-200" x-text="u.name"></a></td>
                    <td class="table-cell text-gray-400" x-text="u.contact_person||'--'"></td>
                    <td class="table-cell text-gray-400" x-text="u.email||'--'"></td>
                    <td class="table-cell text-gray-400" x-text="u.company||'--'"></td>
                    <td class="table-cell text-gray-400" x-text="u.server_count || 0"></td>
                    <td class="table-cell text-gray-400" x-text="u.website_count || 0"></td>
                    <td class="table-cell">
                        <a :href="'customers/'+u.id" class="text-sm text-blue-400 hover:text-blue-300 mr-2">详情</a>
                        <a :href="'customers/'+u.id+'/edit'" class="text-sm text-purple-300 hover:text-purple-200 mr-2">编辑</a>
                        <a href="#" @click.prevent="del(u.id)" class="text-sm text-red-400 hover:text-red-300">删除</a>
                    </td>
                </tr>
            </template>
            </tbody>
        </table>
        <div class="text-center text-gray-500 py-8 text-sm" x-show="!loading && items.length==0">暂无客户</div>
        <div class="flex flex-wrap items-center justify-between gap-3 border-t border-[#202833] px-4 py-3 text-sm text-gray-400" x-show="total > pageSize">
            <div x-text="'第 ' + pageStart + '-' + pageEnd + ' 条，共 ' + total + ' 条'"></div>
            <div class="flex items-center gap-2">
                <button @click="goPage(1)" :disabled="page <= 1" class="btn-secondary text-xs disabled:opacity-40">首页</button>
                <button @click="prevPage()" :disabled="page <= 1" class="btn-secondary text-xs disabled:opacity-40">上一页</button>
                <span class="px-2" x-text="page + ' / ' + totalPages"></span>
                <button @click="nextPage()" :disabled="page >= totalPages" class="btn-secondary text-xs disabled:opacity-40">下一页</button>
                <button @click="goPage(totalPages)" :disabled="page >= totalPages" class="btn-secondary text-xs disabled:opacity-40">末页</button>
            </div>
        </div>
    </div>
</div>
<script>
function customerList() {
    return {
        ...paginationState(),
        items: [], loading: true, search: '',
        async fetch() {
            this.loading=true;
            try {
                const params = new URLSearchParams({
                    search: this.search,
                    page: this.page,
                    page_size: this.pageSize,
                });
                const url = '/api/customers?' + params.toString();
                const d = this.search
                    ? await api(url)
                    : await cachedApi(url, {}, { ttl: API_CACHE_TTL_STABLE_LIST });
                this.items=d.data.items||[];
                this.setPagination(d.data);
                await this.ensurePageHasItems(this.items);
            } catch(e) {}
            this.loading=false;
        },
        async del(id) {
            if(!await confirmModal('确认删除此客户？')) return;
            try { await api('/api/customers/'+id,{method:'DELETE'}); await this.fetch(); } catch(e) { showToast(e.message,'error'); }
        }
    }
}
</script>
{{end}}
