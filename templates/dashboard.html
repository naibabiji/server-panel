{{template "base" .}}
{{define "dashboard_content"}}
<div x-data="dashboardPage()" class="p-6">
    <div class="mb-5 pb-5 border-b border-[#202833]">
        <div class="text-sm text-gray-500">服务器状态、到期提醒和最近告警。</div>
        <div class="flex flex-wrap gap-2 mt-3">
            <a :href="panelURL('/settings#update')" class="badge-warning text-xs" x-show="panelUpdate.hasUpdate" x-text="'面板有新版本 ' + panelUpdate.latestVersion + ' 可用'"></a>
            <a :href="panelURL('/settings#update')" class="badge-warning text-xs" x-show="sysUpdateCount > 0" x-text="sysUpdateCount + ' 个系统包可更新'"></a>
        </div>
    </div>
    <div class="overflow-x-auto mb-6">
        <div class="border border-[#2a3038] bg-[#171b21]" style="display:grid;grid-template-columns:repeat(5,minmax(140px,1fr));min-width:760px;">
            <div class="p-5 border-r border-[#202833]"><div class="text-sm text-gray-400">服务器总数</div><div class="skeleton-block h-7 w-12 mt-1" x-show="loading" x-cloak></div><div class="text-2xl font-semibold mt-1" x-text="stats.total_servers" x-show="!loading">0</div></div>
            <div class="p-5 border-r border-[#202833]"><div class="text-sm text-gray-400">网站总数</div><div class="skeleton-block h-7 w-12 mt-1" x-show="loading" x-cloak></div><div class="text-2xl font-semibold mt-1 text-purple-300" x-text="stats.total_websites" x-show="!loading">0</div></div>
            <div class="p-5 border-r border-[#202833]"><div class="text-sm text-gray-400">Agent 在线</div><div class="skeleton-block h-7 w-12 mt-1" x-show="loading" x-cloak></div><div class="text-2xl font-semibold mt-1 text-green-400" x-text="stats.online_count" x-show="!loading">0</div></div>
            <div class="p-5 border-r border-[#202833]"><div class="text-sm text-gray-400">Agent 离线</div><div class="skeleton-block h-7 w-12 mt-1" x-show="loading" x-cloak></div><div class="text-2xl font-semibold mt-1 text-red-400" x-text="stats.offline_count" x-show="!loading">0</div></div>
            <div class="p-5"><div class="text-sm text-gray-400">30 天内到期</div><div class="skeleton-block h-7 w-12 mt-1" x-show="loading" x-cloak></div><div class="text-2xl font-semibold mt-1 text-yellow-400" x-text="stats.expiring_count" x-show="!loading">0</div></div>
        </div>
    </div>
    <div class="border border-[#2a3038] bg-[#171b21] mb-6" x-show="httpProbeIssues.length">
        <div class="px-5 py-4 border-b border-[#202833] bg-[#181e26] text-sm font-semibold text-red-300">HTTP 探测异常</div>
        <div class="p-5">
            <template x-for="item in httpProbeIssues" :key="'probe-'+item.id">
                <a :href="panelURL(item.detail_path)" class="block py-3 border-b border-[#202833] last:border-0 hover:text-purple-200">
                    <div class="flex items-center justify-between gap-4">
                        <div class="min-w-0">
                            <div class="text-sm text-gray-100" x-text="item.name"></div>
                            <div class="text-xs text-red-400 break-all" :title="item.last_error" x-text="probeErrorSummary(item.last_error)"></div>
                        </div>
                        <div class="text-xs text-gray-500 shrink-0" x-text="fmtTime(item.last_at)"></div>
                    </div>
                </a>
            </template>
        </div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <section class="border border-[#2a3038] bg-[#171b21]">
            <div class="px-5 py-4 border-b border-[#202833] bg-[#181e26] text-sm font-semibold text-gray-100">即将到期的服务器</div>
            <div class="p-5">
                <div class="space-y-3" x-show="loading" x-cloak>
                    <div class="skeleton-block h-5"></div>
                    <div class="skeleton-block h-5"></div>
                    <div class="skeleton-block h-5"></div>
                </div>
                <div class="text-sm text-gray-500" x-show="!loading && !expiring.servers.length">暂无即将到期服务器</div>
                <template x-for="item in expiring.servers" :key="'server-'+item.id">
                    <a :href="panelURL(item.detail_path)" class="block py-3 border-b border-[#202833] last:border-0 hover:text-purple-200">
                        <div class="flex items-center justify-between gap-4">
                            <div class="min-w-0">
                                <div class="text-sm text-gray-100" x-text="item.name"></div>
                                <div class="text-xs text-gray-500" x-text="'到期日：' + item.expiry_date"></div>
                            </div>
                            <div class="text-sm text-yellow-400" x-text="daysText(item.days_left)"></div>
                        </div>
                    </a>
                </template>
            </div>
        </section>
        <section class="border border-[#2a3038] bg-[#171b21]">
            <div class="px-5 py-4 border-b border-[#202833] bg-[#181e26] text-sm font-semibold text-gray-100">即将到期的网站</div>
            <div class="p-5">
                <div class="space-y-3" x-show="loading" x-cloak>
                    <div class="skeleton-block h-5"></div>
                    <div class="skeleton-block h-5"></div>
                    <div class="skeleton-block h-5"></div>
                </div>
                <div class="text-sm text-gray-500" x-show="!loading && !expiring.websites.length">暂无即将到期网站</div>
                <template x-for="item in expiring.websites" :key="'website-'+item.id">
                    <a :href="panelURL(item.detail_path)" class="block py-3 border-b border-[#202833] last:border-0 hover:text-purple-200">
                        <div class="flex items-center justify-between gap-4">
                            <div class="min-w-0">
                                <div class="text-sm text-gray-100" x-text="item.name"></div>
                                <div class="text-xs text-gray-500" x-text="websiteMeta(item)"></div>
                            </div>
                            <div class="text-sm text-yellow-400" x-text="daysText(item.days_left)"></div>
                        </div>
                    </a>
                </template>
            </div>
        </section>
    </div>
    <div class="border border-[#2a3038] bg-[#171b21] mb-6">
        <div class="px-5 py-4 border-b border-[#202833] bg-[#181e26] text-sm font-semibold text-gray-100">最近告警</div>
        <div class="p-5">
            <div class="space-y-3" x-show="loading" x-cloak>
                <div class="skeleton-block h-5"></div>
                <div class="skeleton-block h-5"></div>
                <div class="skeleton-block h-5"></div>
            </div>
            <div class="text-sm text-gray-500" x-show="!loading && !alerts.length">暂无告警</div>
            <template x-for="a in alerts" :key="a.id">
                <div class="flex items-center justify-between py-3 border-b border-[#202833] last:border-0">
                    <div><span :class="'badge-' + (a.level === 'critical' ? 'danger' : a.level === 'warning' ? 'warning' : 'info')" x-text="a.message" class="text-xs"></span></div>
                    <div class="text-xs text-gray-500" x-text="fmtTime(a.created_at)"></div>
                </div>
            </template>
         </div>
    </div>
    <section class="border border-[#2a3038] bg-[#171b21]">
        <div class="px-5 py-4 border-b border-[#202833] bg-[#181e26] flex items-center justify-between gap-3 flex-wrap">
            <div>
                <div class="text-sm font-semibold text-gray-100">面板服务器性能</div>
                <div class="text-xs text-gray-500 mt-1" x-text="hostSummary()"></div>
            </div>
            <select @change="changeHostRange($event.target.value)" class="input-field w-28 text-sm">
                <option value="24h">24小时</option>
                <option value="7d">7天</option>
                <option value="15d">15天</option>
                <option value="30d">30天</option>
            </select>
        </div>
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 p-5">
            <div class="card">
                <div class="text-xs text-gray-400">CPU</div>
                <div class="skeleton-block h-6 w-14 mt-1" x-show="loading" x-cloak></div>
                <div class="text-xl font-bold mt-1 text-purple-400" x-text="(hostLatest.cpu_percent||0).toFixed(1)+'%'" x-show="!loading"></div>
                <div class="mt-2" style="height:40px;position:relative;"><canvas id="cpuChart"></canvas></div>
            </div>
            <div class="card">
                <div class="text-xs text-gray-400">内存</div>
                <div class="skeleton-block h-6 w-14 mt-1" x-show="loading" x-cloak></div>
                <div class="text-xl font-bold mt-1 text-green-400" x-text="(hostLatest.memory_percent||0).toFixed(1)+'%'" x-show="!loading"></div>
                <div class="mt-2" style="height:40px;position:relative;"><canvas id="memChart"></canvas></div>
            </div>
            <div class="card">
                <div class="text-xs text-gray-400">磁盘</div>
                <div class="skeleton-block h-6 w-14 mt-1" x-show="loading" x-cloak></div>
                <div class="text-xl font-bold mt-1 text-yellow-400" x-text="(hostLatest.disk_percent||0).toFixed(1)+'%'" x-show="!loading"></div>
                <div class="mt-2" style="height:40px;"></div>
            </div>
            <div class="card">
                <div class="text-xs text-gray-400">负载 (1m)</div>
                <div class="skeleton-block h-6 w-14 mt-1" x-show="loading" x-cloak></div>
                <div class="text-xl font-bold mt-1 text-gray-200" x-text="(hostLatest.load_avg_1||0).toFixed(2)" x-show="!loading"></div>
                <div class="mt-2" style="height:40px;position:relative;"><canvas id="loadChart"></canvas></div>
            </div>
        </div>
    </section>
</div>
<script>
function dashboardPage() {
    return {
        loading: true,
        stats: { total_servers: 0, total_websites: 0, online_count: 0, offline_count: 0, expiring_count: 0 },
        expiring: { servers: [], websites: [] },
        httpProbeIssues: [],
        alerts: [],
        panelUpdate: { hasUpdate: false, latestVersion: '' },
        sysUpdateCount: 0,
        hostLatest: {},
        hostRange: '24h',
        async init() {
            await Promise.all([
                this.loadHostLatest(),
                this.loadHostCharts(),
                (async () => { try {
                    const d = await api('/api/dashboard/stats');
                    this.stats = d.data;
                } catch(e) {} })(),
                (async () => { try {
                    const d = await api('/api/dashboard/expiring');
                    this.expiring = d.data || { servers: [], websites: [] };
                    this.expiring.servers = this.expiring.servers || [];
                    this.expiring.websites = this.expiring.websites || [];
                } catch(e) {} })(),
                (async () => { try {
                    const d = await api('/api/dashboard/http-probe-issues');
                    this.httpProbeIssues = d.data || [];
                } catch(e) {} })(),
                (async () => { try {
                    const d = await api('/api/dashboard/recent-alerts?limit=10');
                    this.alerts = d.data || [];
                } catch(e) {} })(),
            ]);
            this.loading = false;
            // 下面两个是慢速系统检测接口（GitHub 版本检查 / apt 更新检查），
            // 故意放在 loading 之后，避免阻塞首屏核心数据渲染。
            (async () => { try {
                const d = await api('/api/update/check');
                this.panelUpdate = { hasUpdate: d.data.has_update, latestVersion: d.data.latest_version };
            } catch(e) {} })();
            (async () => { try {
                const d = await api('/api/system/updates');
                this.sysUpdateCount = d.data.count || 0;
            } catch(e) {} })();
        },
        panelURL(path) {
            return (document.body.dataset.panelPrefix || '') + path;
        },
        daysText(days) {
            if (days <= 0) return '今天到期';
            return days + ' 天';
        },
        websiteMeta(item) {
            let text = '到期日：' + item.expiry_date;
            if (item.server_name) text += ' · ' + item.server_name;
            return text;
        },
        probeErrorSummary(msg) {
            if (!msg) return '探测失败';
            if (/context deadline exceeded|timeout|timed out/i.test(msg)) return '连接超时';
            if (/connection refused/i.test(msg)) return '连接被拒绝';
            if (/no such host|dns/i.test(msg)) return '域名解析失败';
            if (/certificate|tls|x509/i.test(msg)) return 'TLS/证书错误';
            if (/^HTTP \d+/.test(msg)) return msg;
            return msg.length > 40 ? msg.slice(0, 40) + '…' : msg;
        },
        hostSummary() {
            const parts = [];
            if (this.hostLatest.hostname) parts.push(this.hostLatest.hostname);
            if (this.hostLatest.cpu_cores) parts.push(this.hostLatest.cpu_cores + ' 核');
            if (this.hostLatest.uptime_seconds) parts.push('运行 ' + formatUptime(this.hostLatest.uptime_seconds));
            return parts.join(' · ') || '暂无数据';
        },
        async loadHostLatest() {
            try { const d = await api('/api/dashboard/host-metrics/latest'); this.hostLatest = d.data || {}; } catch(e) {}
        },
        async loadHostCharts(range) {
            const r = range || this.hostRange;
            this.hostRange = r;
            try {
                const d = await api('/api/dashboard/host-metrics?range='+r);
                updateCharts(d.data || [], true);
            } catch(e) { console.error(e); }
        },
        changeHostRange(range) { this.loadHostCharts(range); }
    }
}
</script>
{{end}}
