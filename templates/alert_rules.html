{{template "base" .}}
{{define "alert_rules_content"}}
<div x-data="alertRules()" x-init="fetch()" class="p-6">
    <div class="flex items-center justify-end mb-4">
        <button @click="openAdd()" class="btn-primary text-sm">+ 添加规则</button>
    </div>
    <div class="card overflow-x-auto">
        <table class="w-full">
            <thead><tr>
                <th class="table-header">类型</th><th class="table-header">名称</th><th class="table-header">阈值</th>
                <th class="table-header">状态</th><th class="table-header">通知客户</th><th class="table-header">操作</th>
            </tr></thead>
            <tbody>
            <template x-for="r in rules" :key="r.id">
                <tr class="border-t border-gray-700/50 hover:bg-white/5">
                    <td class="table-cell"><span class="badge-info text-xs" x-text="typeLabel(r.alert_type)"></span></td>
                    <td class="table-cell text-white" x-text="r.name"></td>
                    <td class="table-cell text-gray-400" x-text="formatThreshold(r)"></td>
                    <td class="table-cell"><span :class="r.enabled ? 'badge-success' : 'badge-danger'" x-text="r.enabled ? '启用' : '禁用'"></span></td>
                    <td class="table-cell"><span x-text="r.notify_user ? '是' : '否'" class="text-gray-400 text-sm"></span></td>
                    <td class="table-cell">
                        <a href="#" @click.prevent="toggle(r)" class="text-sm mr-2" :class="r.enabled ? 'text-yellow-400' : 'text-green-400'" x-text="r.enabled ? '禁用' : '启用'"></a>
                        <a href="#" @click.prevent="openEdit(r)" class="text-sm text-blue-400 mr-2">编辑</a>
                        <a href="#" @click.prevent="del(r.id)" class="text-sm text-red-400">删除</a>
                    </td>
                </tr>
            </template>
            </tbody>
        </table>
        <div class="text-center text-gray-500 py-8 text-sm" x-show="rules.length==0">暂无规则，点击右上角添加</div>
    </div>

    <!-- Add Rule Modal -->
    <div class="modal-overlay" x-show="showModal" x-cloak @click.self="showModal=false">
        <div class="modal-content">
            <h3 class="text-lg font-semibold text-purple-300 mb-4" x-text="editingID ? '编辑告警规则' : '添加告警规则'"></h3>
            <div class="space-y-3">
                <div><label class="label">告警类型</label>
                    <select x-model="form.alert_type" @change="applyTypeDefaults()" class="input-field">
                        <option value="server_expiry">服务器到期</option><option value="website_expiry">网站到期</option>
                        <option value="http_probe_down">HTTP探测异常</option><option value="cpu_high">CPU过高</option>
                        <option value="memory_high">内存过高</option><option value="disk_high">磁盘过高</option>
                        <option value="server_offline">服务器离线</option>
                    </select>
                </div>
                <div><label class="label">规则名称</label><input type="text" x-model="form.name" class="input-field" placeholder="例如：到期提醒"></div>
                <div x-show="thresholdVisible()">
                    <label class="label" x-text="thresholdLabel()"></label>
                    <input type="number" min="0" :step="thresholdStep()" x-model.number="form.threshold_value" class="input-field" :placeholder="thresholdPlaceholder()">
                    <div class="text-xs text-gray-500 mt-1" x-text="thresholdHelp()"></div>
                </div>
                <div x-show="thresholdCountVisible()">
                    <label class="label">连续采样次数</label>
                    <input type="number" min="1" step="1" x-model.number="form.threshold_count" class="input-field" placeholder="默认 3">
                    <div class="text-xs text-gray-500 mt-1">连续 N 次采样都超过阈值才触发；实际时长取决于监控数据上报间隔。</div>
                </div>
                <div x-show="form.alert_type === 'http_probe_down'" class="text-xs text-gray-500 bg-gray-900/60 border border-gray-700/60 rounded px-3 py-2">
                    HTTP 探测异常不使用数值阈值；启用探测的服务器被判定不可用时触发。
                </div>
                <div class="flex items-center gap-2"><input type="checkbox" :checked="!!form.notify_user" @change="form.notify_user = $event.target.checked ? 1 : 0"><span class="text-sm text-gray-400">通知客户</span></div>
                <div><label class="label">通知邮箱</label><input type="text" x-model="form.notify_email" class="input-field" placeholder="留空使用管理员邮箱"></div>
            </div>
            <div class="flex gap-3 mt-5">
                <button @click="save()" class="btn-primary" :disabled="saving" x-text="saving ? '保存中...' : '保存'"></button>
                <button @click="showModal=false" class="btn-secondary">取消</button>
            </div>
        </div>
    </div>
</div>
<script>
function alertRules() {
    return {
        rules: [], showModal: false, saving: false, editingID: null,
        form: { alert_type:'server_expiry', name:'', enabled:1, threshold_value:30, threshold_count:3, notify_user:0, notify_email:'' },
        typeLabel(t) {
            const m = { server_expiry:'服务器到期', website_expiry:'网站到期', http_probe_down:'HTTP探测异常', cpu_high:'CPU过高', memory_high:'内存过高', disk_high:'磁盘过高', server_offline:'服务器离线' };
            return m[t] || t;
        },
        formatThreshold(r) {
            if (['server_expiry','website_expiry'].includes(r.alert_type)) return '提前 ' + r.threshold_value + ' 天';
            if (['cpu_high','memory_high'].includes(r.alert_type)) return r.threshold_value + '% · 连续 ' + (r.threshold_count || 3) + ' 次';
            if (r.alert_type === 'disk_high') return r.threshold_value + '%';
            if (r.alert_type === 'server_offline') return '离线超过 ' + r.threshold_value + ' 分钟';
            if (r.alert_type === 'http_probe_down') return '探测失败';
            return r.threshold_value || '-';
        },
        typeDefaults(t) {
            const m = {
                server_expiry: { threshold_value:30, threshold_count:3 },
                website_expiry: { threshold_value:30, threshold_count:3 },
                http_probe_down: { threshold_value:0, threshold_count:3 },
                cpu_high: { threshold_value:90, threshold_count:3 },
                memory_high: { threshold_value:90, threshold_count:3 },
                disk_high: { threshold_value:90, threshold_count:3 },
                server_offline: { threshold_value:5, threshold_count:3 },
            };
            return m[t] || m.server_expiry;
        },
        applyTypeDefaults() {
            Object.assign(this.form, this.typeDefaults(this.form.alert_type));
        },
        thresholdVisible() {
            return this.form.alert_type !== 'http_probe_down';
        },
        thresholdCountVisible() {
            return ['cpu_high','memory_high'].includes(this.form.alert_type);
        },
        thresholdLabel() {
            if (['server_expiry','website_expiry'].includes(this.form.alert_type)) return '提前提醒天数';
            if (['cpu_high','memory_high','disk_high'].includes(this.form.alert_type)) return '使用率阈值（%）';
            if (this.form.alert_type === 'server_offline') return '离线时长阈值（分钟）';
            return '阈值';
        },
        thresholdPlaceholder() {
            if (['server_expiry','website_expiry'].includes(this.form.alert_type)) return '例如 30，表示到期前 30 天内提醒';
            if (['cpu_high','memory_high','disk_high'].includes(this.form.alert_type)) return '例如 90，表示超过 90%';
            if (this.form.alert_type === 'server_offline') return '例如 5，表示离线超过 5 分钟';
            return '';
        },
        thresholdHelp() {
            if (['server_expiry','website_expiry'].includes(this.form.alert_type)) return '单位：天。资源到期日在该天数范围内时触发。';
            if (['cpu_high','memory_high'].includes(this.form.alert_type)) return '单位：百分比。需要配合连续采样次数判断，不是固定秒数或分钟数。';
            if (this.form.alert_type === 'disk_high') return '单位：百分比。当前代码按最新一次磁盘使用率判断。';
            if (this.form.alert_type === 'server_offline') return '单位：分钟。服务器离线超过该时长后触发；若面板 TCP 探测发现服务器网络仍可达，会改为触发级别更低的"探针失联"告警，而不是"服务器离线"。';
            return '';
        },
        thresholdStep() {
            return ['cpu_high','memory_high','disk_high'].includes(this.form.alert_type) ? '0.1' : '1';
        },
        async fetch() { try { const d = await api('/api/alerts/rules'); this.rules = d.data || []; } catch(e) {} },
        blankForm() {
            return { alert_type:'server_expiry', name:'', enabled:1, threshold_value:30, threshold_count:3, notify_user:0, notify_email:'' };
        },
        openAdd() {
            this.editingID = null;
            this.form = this.blankForm();
            this.saving = false;
            this.showModal = true;
        },
        openEdit(r) {
            this.editingID = r.id;
            this.form = {
                alert_type: r.alert_type,
                name: r.name || '',
                enabled: r.enabled ? 1 : 0,
                threshold_value: Number(r.threshold_value) || 0,
                threshold_count: parseInt(r.threshold_count, 10) || 3,
                notify_user: r.notify_user ? 1 : 0,
                notify_email: r.notify_email || '',
                server_id: r.server_id || null,
            };
            this.saving = false;
            this.showModal = true;
        },
        async save() {
            this.saving = true;
            const body = {
                ...this.form,
                name: (this.form.name || '').trim(),
                notify_email: (this.form.notify_email || '').trim(),
                enabled: this.form.enabled ? 1 : 0,
                threshold_value: this.thresholdVisible() ? (Number(this.form.threshold_value) || 0) : 0,
                threshold_count: parseInt(this.form.threshold_count, 10) || 3,
                notify_user: this.form.notify_user ? 1 : 0,
            };
            if (!body.name) {
                showToast('请输入规则名称','error');
                this.saving = false;
                return;
            }
            if (this.thresholdVisible() && body.threshold_value <= 0) {
                showToast('请输入大于 0 的阈值','error');
                this.saving = false;
                return;
            }
            if (this.thresholdCountVisible() && body.threshold_count < 1) {
                showToast('连续采样次数不能小于 1','error');
                this.saving = false;
                return;
            }
            try {
                const url = this.editingID ? '/api/alerts/rules/' + this.editingID : '/api/alerts/rules';
                const method = this.editingID ? 'PUT' : 'POST';
                await api(url, {method, body});
                this.showModal = false;
                this.editingID = null;
                await this.fetch();
                showToast(method === 'PUT' ? '更新成功' : '添加成功','success');
            }
            catch(e) { showToast(e.message,'error'); }
            this.saving = false;
        },
        async toggle(r) {
            r.enabled = r.enabled ? 0 : 1;
            try { await api('/api/alerts/rules/'+r.id, {method:'PUT', body: r}); await this.fetch(); }
            catch(e) { showToast(e.message,'error'); }
        },
        async del(id) {
            if (!await confirmModal('确认删除？')) return;
            try { await api('/api/alerts/rules/'+id, {method:'DELETE'}); await this.fetch(); }
            catch(e) { showToast(e.message,'error'); }
        }
    }
}
</script>
{{end}}
