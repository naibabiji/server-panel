{{template "base" .}}
{{define "website_list_content"}}
<div x-data="websiteList()" class="p-6">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
        <h2 class="text-lg font-semibold text-purple-200">网站</h2>
        <a href="websites/new" class="btn-primary text-sm">添加网站</a>
    </div>
    <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
        <div class="flex gap-2">
            <input type="text" x-model="search" @input="resetAndFetch()" placeholder="搜索名称/域名..." class="input-field w-48">
            <select x-model="filterServer" @change="resetAndFetch()" class="input-field w-40">
                <option value="">全部服务器</option>
                <template x-for="s in servers" :key="s.id"><option :value="s.id" x-text="s.name"></option></template>
            </select>
            <select x-model="filterCustomer" @change="resetAndFetch()" class="input-field w-36">
                <option value="">全部客户</option>
                <template x-for="c in customers" :key="c.id"><option :value="c.id" x-text="c.name"></option></template>
            </select>
        </div>
    </div>
    <div class="border border-[#2a3038] bg-[#171b21] overflow-x-auto">
        <table class="w-full">
            <thead><tr>
                <th class="table-header">名称</th><th class="table-header">域名</th><th class="table-header">服务器</th>
                <th class="table-header">类型</th><th class="table-header">面板</th><th class="table-header">状态</th>
                <th class="table-header cursor-pointer select-none hover:text-gray-200" @click="toggleSort('expiry_date')">
                    到期日<span x-text="sortIndicator('expiry_date')"></span>
                </th>
                <th class="table-header">操作</th>
            </tr></thead>
            <tbody>
            <template x-for="w in items" :key="w.id">
                <tr class="border-t border-[#202833] hover:bg-[#1d232b]">
                    <td class="table-cell text-white"><a :href="'websites/'+w.id" class="hover:text-purple-200" x-text="w.name || w.domain"></a></td>
                    <td class="table-cell"><a :href="externalURL(w.domain)" target="_blank" rel="noopener noreferrer" class="text-blue-400 hover:text-blue-300 break-all" x-text="w.domain"></a></td>
                    <td class="table-cell"><a :href="serverURL(w)" class="text-blue-400 hover:text-blue-300" x-text="w.server_name || '--'"></a></td>
                    <td class="table-cell"><span class="badge-info text-xs" x-text="w.site_type || '--'"></span></td>
                    <td class="table-cell text-gray-400" x-text="w.panel_type == 'none' ? '--' : (w.panel_type || '--')"></td>
                    <td class="table-cell"><span :class="w.status=='active'?'badge-success':'badge-danger'" x-text="w.status=='active'?'运行中':'已到期'"></span></td>
                    <td class="table-cell" :class="expiryClass(w.expiry_date)" x-text="w.expiry_date || '--'"></td>
                    <td class="table-cell">
                        <a :href="'websites/'+w.id" class="text-sm text-blue-400 hover:text-blue-300 mr-2">详情</a>
                        <a :href="'websites/'+w.id+'/edit'" class="text-sm text-purple-300 hover:text-purple-200 mr-2">编辑</a>
                        <a href="#" @click.prevent="renew(w)" class="text-sm text-green-400 hover:text-green-300 mr-2">续费</a>
                        <a href="#" @click.prevent="del(w.id)" class="text-sm text-red-400 hover:text-red-300">删除</a>
                    </td>
                </tr>
            </template>
            </tbody>
        </table>
        <div class="text-center text-gray-500 py-8 text-sm" x-show="!loading && items.length==0">暂无网站</div>
        <div class="flex flex-wrap items-center justify-between gap-3 border-t border-[#202833] px-4 py-3 text-sm text-gray-400" x-show="total > pageSize">
            <div x-text="'第 ' + pageStart + '-' + pageEnd + ' 条，共 ' + total + ' 条'"></div>
            <div class="flex items-center gap-2">
                <button @click="goPage(1)" :disabled="page <= 1" class="btn-secondary text-xs disabled:opacity-40">首页</button>
                <button @click="prevPage()" :disabled="page <= 1" class="btn-secondary text-xs disabled:opacity-40">上一页</button>
                <span class="px-2" x-text="page + ' / ' + totalPages"></span>
                <button @click="nextPage()" :disabled="page >= totalPages" class="btn-secondary text-xs disabled:opacity-40">下一页</button>
                <button @click="goPage(totalPages)" :disabled="page >= totalPages" class="btn-secondary text-xs disabled:opacity-40">末页</button>
            </div>
        </div>
    </div>
</div>
<script>
function websiteList() {
    return {
        ...paginationState(),
        items: [], servers: [], customers: [], loading: true, search: '', filterServer: '', filterCustomer: '',
        sortBy: 'expiry_date', sortOrder: 'asc',
        async fetch() {
            this.loading = true;
            try {
                const params = new URLSearchParams({
                    search: this.search,
                    server_id: this.filterServer,
                    customer_id: this.filterCustomer,
                    sort: this.sortBy,
                    order: this.sortOrder,
                    page: this.page,
                    page_size: this.pageSize,
                });
                const url = '/api/websites?' + params.toString();
                // 带搜索词的请求不缓存（每次敲键都换 key 会堆积），只缓存默认/筛选列表
                const d = this.search ? await api(url) : await cachedApi(url, {}, { ttl: API_CACHE_TTL_LIST });
                this.items = d.data.items || [];
                this.setPagination(d.data);
                await this.ensurePageHasItems(this.items);
            } catch(e) {}
            this.loading = false;
        },
        async init() {
            await Promise.all([
                this.fetch(),
                (async () => { try { const d = await cachedApi('/api/servers?page_size=100', {}, { ttl: API_CACHE_TTL_LIST }); this.servers = d.data.items || []; } catch(e) {} })(),
                (async () => { try { const d = await cachedApi('/api/customers?page_size=100', {}, { ttl: API_CACHE_TTL_STABLE_LIST }); this.customers = d.data.items || []; } catch(e) {} })(),
            ]);
        },
        externalURL(domain) {
            if (!domain) return '#';
            if (/^https?:\/\//i.test(domain)) return domain;
            return 'https://' + domain;
        },
        serverURL(w) {
            if (!w || !w.server_id) return '#';
            return 'servers/' + w.server_id;
        },
        toggleSort(field) {
            if (this.sortBy === field) {
                this.sortOrder = this.sortOrder === 'asc' ? 'desc' : 'asc';
            } else {
                this.sortBy = field;
                this.sortOrder = 'asc';
            }
            this.resetAndFetch();
        },
        sortIndicator(field) {
            if (this.sortBy !== field) return '';
            return this.sortOrder === 'asc' ? ' ▲' : ' ▼';
        },
        expiryClass,
        async renew(w) {
            const newDate = await inputModal({
                title: '续费 ' + (w.name || w.domain),
                label: '新到期日',
                type: 'date',
                defaultValue: w.expiry_date || new Date().toISOString().slice(0, 10),
            });
            if (!newDate) return;
            try {
                const d = await api('/api/websites/' + w.id);
                const full = d.data;
                full.expiry_date = newDate;
                full.status = 'active';
                await api('/api/websites/' + w.id, { method: 'PUT', body: full });
                showToast('续费成功', 'success');
                await this.fetch();
            } catch (e) { showToast(e.message, 'error'); }
        },
        async del(id) {
            if (!await confirmModal('确认删除此网站？')) return;
            try { await api('/api/websites/'+id, {method:'DELETE'}); await this.fetch(); }
            catch(e) { showToast(e.message, 'error'); }
        }
    }
}
</script>
{{end}}
