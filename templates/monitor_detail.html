{{template "base" .}}
{{define "monitor_detail_content"}}
<div x-data="monitorDetail()" x-init="init()" class="p-6">
    <div class="flex items-center justify-between mb-4">
        <div>
            <h2 class="text-lg font-semibold text-purple-300" x-text="server.name || '加载中...'"></h2>
            <div class="text-xs text-gray-500 mt-1" x-text="server.ip_address"></div>
        </div>
        <div class="flex gap-2">
            <select @change="changeRange($event.target.value)" class="input-field w-28 text-sm">
                <option value="24h">24小时</option>
                <option value="7d">7天</option>
                <option value="15d">15天</option>
                <option value="30d">30天</option>
            </select>
            <a href="../monitor" class="btn-secondary text-sm">返回</a>
        </div>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div class="card">
            <div class="text-xs text-gray-400">CPU</div>
            <div class="text-xl font-bold mt-1 text-purple-400" x-text="(latest.cpu_percent||0).toFixed(1)+'%'"></div>
        </div>
        <div class="card">
            <div class="text-xs text-gray-400">内存</div>
            <div class="text-xl font-bold mt-1 text-green-400" x-text="(latest.memory_percent||0).toFixed(1)+'%'"></div>
        </div>
        <div class="card">
            <div class="text-xs text-gray-400">磁盘</div>
            <div class="text-xl font-bold mt-1 text-yellow-400" x-text="(latest.disk_percent||0).toFixed(1)+'%'"></div>
        </div>
        <div class="card">
            <div class="text-xs text-gray-400">负载 (1m)</div>
            <div class="text-xl font-bold mt-1 text-gray-200" x-text="(latest.load_avg_1||0).toFixed(2)"></div>
        </div>
    </div>

    <div class="card mb-4" style="height:260px;position:relative;"><canvas id="cpuChart"></canvas></div>
    <div class="card mb-4" style="height:260px;position:relative;"><canvas id="memChart"></canvas></div>
    <div class="card" style="height:260px;position:relative;"><canvas id="loadChart"></canvas></div>
</div>
<script>
let charts = {};

function destroyCharts() {
    Object.values(charts).forEach(c => c.destroy());
    charts = {};
}

function hexToRGBA(hex, alpha) {
    const n = parseInt(hex.replace('#', ''), 16);
    return `rgba(${(n >> 16) & 255}, ${(n >> 8) & 255}, ${n & 255}, ${alpha})`;
}

// Load 不是百分比，仍然按数据范围给一个规整上限。
function niceLoadAxisMax(values) {
    const nums = (values || []).filter(v => typeof v === 'number' && isFinite(v));
    const max = nums.length ? Math.max(...nums) : 0;
    const floor = 1;
    let target = Math.max(max * 1.25, floor);
    const step = target > 10 ? 1 : 0.5;
    return Math.ceil(target / step) * step;
}

function makeChart(canvasId, label, color) {
    const ctx = document.getElementById(canvasId);
    if (!ctx) return null;
    return new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{
            label, data: [],
            borderColor: color, borderWidth: 2, tension: 0.3,
            fill: true, backgroundColor: hexToRGBA(color, 0.12),
            pointRadius: (c) => c.dataIndex === c.dataset.data.length - 1 ? 4 : 0,
            pointHoverRadius: 5, pointHitRadius: 12,
            pointBackgroundColor: color, pointBorderColor: '#171b21', pointBorderWidth: 2
        }] },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { labels: { color: '#a1a1aa', font: { size: 11 } } },
                tooltip: {
                    backgroundColor: '#11151a', borderColor: '#2a3038', borderWidth: 1,
                    titleColor: '#e5e7eb', bodyColor: '#e5e7eb', padding: 10, displayColors: false
                }
            },
            scales: {
                x: { ticks: { color: '#52525b', maxTicksLimit: 10 }, grid: { color: '#27272a' } },
                y: { ticks: { color: '#52525b' }, grid: { color: '#27272a' }, beginAtZero: true }
            }
        }
    });
}

function updateCharts(points) {
    destroyCharts();
    if (!points || !points.length) return;

    const labels = points.map(p => {
        const d = new Date(p.t.replace(' ', 'T'));
        return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    });

    charts.cpu = makeChart('cpuChart', 'CPU %', '#a78bfa');
    if (charts.cpu) {
        const data = points.map(p => p.cpu);
        charts.cpu.data.labels = labels;
        charts.cpu.data.datasets[0].data = data;
        charts.cpu.options.scales.y.min = 0;
        charts.cpu.options.scales.y.max = 100;
        charts.cpu.update();
    }

    charts.mem = makeChart('memChart', 'Memory %', '#4ade80');
    if (charts.mem) {
        const data = points.map(p => p.mem);
        charts.mem.data.labels = labels;
        charts.mem.data.datasets[0].data = data;
        charts.mem.options.scales.y.min = 0;
        charts.mem.options.scales.y.max = 100;
        charts.mem.update();
    }

    charts.load = makeChart('loadChart', 'Load 1m', '#fbbf24');
    if (charts.load) {
        const data = points.map(p => p.load1);
        charts.load.data.labels = labels;
        charts.load.data.datasets[0].data = data;
        charts.load.options.scales.y.suggestedMax = niceLoadAxisMax(data);
        charts.load.update();
    }
}

function monitorDetail() {
    return {
        server: {}, latest: {}, currentRange: '24h',
        async init() {
            const id = window.location.pathname.split('/').filter(Boolean).pop();
            await Promise.all([
                (async () => { try { const d = await api('/api/servers/'+id); this.server = d.data; } catch(e) {} })(),
                (async () => { try { const d = await api('/api/monitor/'+id+'/latest'); this.latest = d.data; } catch(e) {} })(),
                this.loadCharts(),
            ]);
        },
        async loadCharts(range) {
            const r = range || this.currentRange;
            this.currentRange = r;
            const id = window.location.pathname.split('/').filter(Boolean).pop();
            try {
                const d = await api('/api/monitor/'+id+'?range='+r);
                updateCharts(d.data || []);
            } catch(e) { console.error(e); }
        },
        changeRange(range) { this.loadCharts(range); }
    }
}
</script>
{{end}}
