{{template "base" .}}
{{define "provider_list_content"}}
<div x-data="providerList()" x-init="fetch()" class="p-6">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-purple-200">服务商</h2>
        <a href="providers/new" class="btn-primary text-sm">添加服务商</a>
    </div>
    <div class="mb-4"><input type="text" x-model="search" @input="resetAndFetch()" placeholder="搜索服务商..." class="input-field w-48"></div>
    <div class="border border-[#2a3038] bg-[#171b21] overflow-x-auto">
        <table class="w-full">
            <thead><tr>
                <th class="table-header">名称</th><th class="table-header">官网</th><th class="table-header">联系方式</th><th class="table-header">备注</th><th class="table-header">操作</th>
            </tr></thead>
            <tbody>
            <template x-for="p in items" :key="p.id">
                <tr class="border-t border-[#202833] hover:bg-[#1d232b]">
                    <td class="table-cell text-white"><a :href="'providers/'+p.id" class="hover:text-purple-200" x-text="p.name"></a></td>
                    <td class="table-cell"><a :href="externalURL(p.website)" target="_blank" rel="noopener noreferrer" class="text-purple-400 hover:text-purple-300 text-sm" x-text="p.website||'--'"></a></td>
                    <td class="table-cell text-gray-400" x-text="p.contact||'--'"></td>
                    <td class="table-cell text-gray-400 text-sm whitespace-pre-wrap" x-text="p.notes||'--'"></td>
                    <td class="table-cell">
                        <a :href="'providers/'+p.id" class="text-sm text-blue-400 hover:text-blue-300 mr-2">详情</a>
                        <a :href="'providers/'+p.id+'/edit'" class="text-sm text-purple-300 hover:text-purple-200 mr-2">编辑</a>
                        <a href="#" @click.prevent="del(p.id)" class="text-sm text-red-400 hover:text-red-300">删除</a>
                    </td>
                </tr>
            </template>
            </tbody>
        </table>
        <div class="text-center text-gray-500 py-8 text-sm" x-show="!loading && items.length==0">暂无服务商</div>
        <div class="flex flex-wrap items-center justify-between gap-3 border-t border-[#202833] px-4 py-3 text-sm text-gray-400" x-show="total > pageSize">
            <div x-text="'第 ' + pageStart + '-' + pageEnd + ' 条，共 ' + total + ' 条'"></div>
            <div class="flex items-center gap-2">
                <button @click="goPage(1)" :disabled="page <= 1" class="btn-secondary text-xs disabled:opacity-40">首页</button>
                <button @click="prevPage()" :disabled="page <= 1" class="btn-secondary text-xs disabled:opacity-40">上一页</button>
                <span class="px-2" x-text="page + ' / ' + totalPages"></span>
                <button @click="nextPage()" :disabled="page >= totalPages" class="btn-secondary text-xs disabled:opacity-40">下一页</button>
                <button @click="goPage(totalPages)" :disabled="page >= totalPages" class="btn-secondary text-xs disabled:opacity-40">末页</button>
            </div>
        </div>
    </div>
</div>
<script>
function providerList() {
    return {
        ...paginationState(),
        items: [], loading: true, search: '',
        async fetch() {
            this.loading = true;
            try {
                const params = new URLSearchParams({
                    search: this.search,
                    page: this.page,
                    page_size: this.pageSize,
                });
                const d = await api('/api/providers?' + params.toString());
                this.items = d.data.items || [];
                this.setPagination(d.data);
                await this.ensurePageHasItems(this.items);
            } catch(e) {}
            this.loading = false;
        },
        externalURL(url) {
            if (!url) return '#';
            if (/^https?:\/\//i.test(url)) return url;
            return 'https://' + url;
        },
        async del(id) {
            if (!await confirmModal('确认删除？')) return;
            try { await api('/api/providers/'+id, {method:'DELETE'}); await this.fetch(); } catch(e) { showToast(e.message,'error'); }
        }
    }
}
</script>
{{end}}
