{{template "base" .}}
{{define "server_list_content"}}
<div x-data="serverList()" x-init="fetch()" class="p-6">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
        <div class="flex gap-2">
            <input type="text" x-model="search" @input="fetch()" placeholder="搜索名称/IP/机房..." class="input-field w-48">
            <select x-model="filterStatus" @change="fetch()" class="input-field w-32">
                <option value="">全部状态</option>
                <option value="active">活跃</option>
                <option value="expired">过期</option>
            </select>
        </div>
        <a href="servers/new" class="btn-primary text-sm">+ 添加服务器</a>
    </div>

    <div class="card overflow-x-auto">
        <table class="w-full">
            <thead><tr>
                <th class="table-header">名称</th><th class="table-header">IP</th><th class="table-header">类型</th>
                <th class="table-header">面板</th><th class="table-header">状态</th><th class="table-header">在线</th>
                <th class="table-header">到期日</th><th class="table-header">操作</th>
            </tr></thead>
            <tbody>
            <template x-for="s in items" :key="s.id">
                <tr class="border-t border-gray-700/50 hover:bg-white/5">
                    <td class="table-cell"><a :href="'servers/'+s.id" class="text-purple-400 hover:text-purple-300" x-text="s.name"></a></td>
                    <td class="table-cell text-gray-400" x-text="s.ip_address || '--'"></td>
                    <td class="table-cell"><span class="badge-info" x-text="s.server_type"></span></td>
                    <td class="table-cell text-gray-400" x-text="s.panel_type == 'none' ? '--' : s.panel_type"></td>
                    <td class="table-cell"><span :class="s.status=='active'?'badge-success':'badge-danger'" x-text="s.status=='active'?'活跃':'过期'"></span></td>
                    <td class="table-cell"><span :class="s.is_online ? 'text-green-400' : 'text-red-400'" x-text="s.is_online ? '●' : '○'" :title="s.is_online ? '在线' : '离线'"></span></td>
                    <td class="table-cell text-gray-400" x-text="s.expiry_date || '--'"></td>
                    <td class="table-cell">
                        <div class="flex gap-2">
                            <a :href="'servers/'+s.id" class="text-sm text-purple-400 hover:text-purple-300">详情</a>
                            <a :href="'servers/'+s.id+'/edit'" class="text-sm text-blue-400 hover:text-blue-300">编辑</a>
                            <a href="#" @click.prevent="del(s.id)" class="text-sm text-red-400 hover:text-red-300">删除</a>
                        </div>
                    </td>
                </tr>
            </template>
            </tbody>
        </table>
        <div class="text-center text-gray-500 py-8 text-sm" x-show="!loading && items.length==0">暂无服务器，点击右上角添加</div>
    </div>
</div>
<script>
function serverList() {
    return {
        items: [], loading: true, search: '', filterStatus: '',
        async fetch() {
            this.loading = true;
            try {
                const d = await api('/api/servers?search='+encodeURIComponent(this.search)+'&status='+this.filterStatus+'&page_size=100');
                this.items = d.data.items || [];
            } catch(e) {}
            this.loading = false;
        },
        async del(id) {
            if (!await confirmModal('确认删除此服务器？')) return;
            try { await api('/api/servers/'+id, {method:'DELETE'}); await this.fetch(); }
            catch(e) { showToast(e.message, 'error'); }
        }
    }
}
</script>
{{end}}
