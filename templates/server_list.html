{{template "base" .}}
{{define "server_list_content"}}
<div x-data="serverList()" x-init="fetch(); loadProviders(); loadCustomers()" class="p-6">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
        <h2 class="text-lg font-semibold text-gray-100">服务器</h2>
        <a href="servers/new" class="btn-primary text-sm">添加服务器</a>
    </div>
    <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
        <div class="flex gap-2">
            <input type="text" x-model="search" @input="resetAndFetch()" placeholder="搜索名称/IP/机房..." class="input-field w-48">
            <select x-model="filterStatus" @change="resetAndFetch()" class="input-field w-32">
                <option value="">全部状态</option>
                <option value="active">活跃</option>
                <option value="expired">过期</option>
            </select>
            <select x-model="filterProvider" @change="resetAndFetch()" class="input-field w-36">
                <option value="">全部服务商</option>
                <template x-for="p in providers" :key="p.id"><option :value="p.id" x-text="p.name"></option></template>
            </select>
            <select x-model="filterCustomer" @change="resetAndFetch()" class="input-field w-36">
                <option value="">全部客户</option>
                <template x-for="c in customers" :key="c.id"><option :value="c.id" x-text="c.name"></option></template>
            </select>
        </div>
    </div>

    <div class="card overflow-x-auto">
        <table class="w-full">
            <thead><tr>
                <th class="table-header">名称</th><th class="table-header">IP</th><th class="table-header">服务商</th><th class="table-header">类型</th>
                <th class="table-header">面板</th><th class="table-header">状态</th><th class="table-header">在线</th>
                <th class="table-header cursor-pointer select-none hover:text-gray-200" @click="toggleSort('expiry_date')">
                    到期日<span x-text="sortIndicator('expiry_date')"></span>
                </th>
                <th class="table-header">操作</th>
            </tr></thead>
            <tbody>
            <template x-for="s in items" :key="s.id">
                <tr class="border-t border-[#252c35] hover:bg-[#1d232b]">
                    <td class="table-cell"><a :href="'servers/'+s.id" class="text-purple-300 hover:text-purple-200" x-text="s.name"></a></td>
                    <td class="table-cell text-gray-400" x-text="s.ip_address || '--'"></td>
                    <td class="table-cell text-gray-400" x-text="s.provider_name || '--'"></td>
                    <td class="table-cell"><span class="badge-info" x-text="s.server_type"></span></td>
                    <td class="table-cell text-gray-400" x-text="s.panel_type == 'none' ? '--' : s.panel_type"></td>
                    <td class="table-cell"><span :class="s.status=='active'?'badge-success':'badge-danger'" x-text="s.status=='active'?'活跃':'过期'"></span></td>
                    <td class="table-cell"><span :class="s.is_online ? 'text-green-400' : 'text-gray-500'" x-text="s.is_online ? '在线' : '未知'"></span></td>
                    <td class="table-cell" :class="expiryClass(s.expiry_date)" x-text="s.expiry_date || '--'"></td>
                    <td class="table-cell">
                        <div class="flex gap-2">
                            <a :href="'servers/'+s.id" class="text-sm text-purple-300 hover:text-purple-200">详情</a>
                            <a :href="'servers/'+s.id+'/edit'" class="text-sm text-gray-300 hover:text-white">编辑</a>
                            <a href="#" @click.prevent="renew(s)" class="text-sm text-green-400 hover:text-green-300">续费</a>
                            <a href="#" @click.prevent="del(s.id)" class="text-sm text-red-400 hover:text-red-300">删除</a>
                        </div>
                    </td>
                </tr>
            </template>
            </tbody>
        </table>
        <div class="text-center text-gray-500 py-8 text-sm" x-show="!loading && items.length==0">暂无服务器，点击右上角添加</div>
        <div class="flex flex-wrap items-center justify-between gap-3 border-t border-[#252c35] px-4 py-3 text-sm text-gray-400" x-show="total > pageSize">
            <div x-text="'第 ' + pageStart + '-' + pageEnd + ' 条，共 ' + total + ' 条'"></div>
            <div class="flex items-center gap-2">
                <button @click="goPage(1)" :disabled="page <= 1" class="btn-secondary text-xs disabled:opacity-40">首页</button>
                <button @click="prevPage()" :disabled="page <= 1" class="btn-secondary text-xs disabled:opacity-40">上一页</button>
                <span class="px-2" x-text="page + ' / ' + totalPages"></span>
                <button @click="nextPage()" :disabled="page >= totalPages" class="btn-secondary text-xs disabled:opacity-40">下一页</button>
                <button @click="goPage(totalPages)" :disabled="page >= totalPages" class="btn-secondary text-xs disabled:opacity-40">末页</button>
            </div>
        </div>
    </div>
</div>
<script>
function serverList() {
    return {
        ...paginationState(),
        items: [], loading: true, search: '', filterStatus: '', filterProvider: '', filterCustomer: '',
        providers: [], customers: [], sortBy: 'created_at', sortOrder: 'desc',
        async fetch() {
            this.loading = true;
            try {
                const params = new URLSearchParams({
                    search: this.search,
                    status: this.filterStatus,
                    provider_id: this.filterProvider,
                    customer_id: this.filterCustomer,
                    sort: this.sortBy,
                    order: this.sortOrder,
                    page: this.page,
                    page_size: this.pageSize,
                });
                const url = '/api/servers?' + params.toString();
                // 带搜索词的请求不缓存（每次敲键都换 key 会堆积），只缓存默认/筛选列表
                const d = this.search ? await api(url) : await cachedApi(url, {}, { ttl: API_CACHE_TTL_LIST });
                this.items = d.data.items || [];
                this.setPagination(d.data);
                await this.ensurePageHasItems(this.items);
            } catch(e) {}
            this.loading = false;
        },
        async loadProviders() {
            try {
                const d = await cachedApi('/api/providers?page_size=100', {}, { ttl: API_CACHE_TTL_STABLE_LIST });
                this.providers = d.data.items || [];
            } catch(e) {}
        },
        async loadCustomers() {
            try {
                const d = await cachedApi('/api/customers?page_size=100', {}, { ttl: API_CACHE_TTL_STABLE_LIST });
                this.customers = d.data.items || [];
            } catch(e) {}
        },
        toggleSort(field) {
            if (this.sortBy === field) {
                this.sortOrder = this.sortOrder === 'asc' ? 'desc' : 'asc';
            } else {
                this.sortBy = field;
                this.sortOrder = 'asc';
            }
            this.resetAndFetch();
        },
        sortIndicator(field) {
            if (this.sortBy !== field) return '';
            return this.sortOrder === 'asc' ? ' ▲' : ' ▼';
        },
        expiryClass,
        async renew(s) {
            const newDate = await inputModal({
                title: '续费 ' + s.name,
                label: '新到期日',
                type: 'date',
                defaultValue: s.expiry_date || new Date().toISOString().slice(0, 10),
            });
            if (!newDate) return;
            try {
                const d = await api('/api/servers/' + s.id);
                const full = d.data;
                full.expiry_date = newDate;
                full.status = 'active';
                await api('/api/servers/' + s.id, { method: 'PUT', body: full });
                showToast('续费成功', 'success');
                await this.fetch();
            } catch (e) { showToast(e.message, 'error'); }
        },
        async del(id) {
            if (!await confirmModal('确认删除此服务器？')) return;
            try { await api('/api/servers/'+id, {method:'DELETE'}); await this.fetch(); }
            catch(e) { showToast(e.message, 'error'); }
        }
    }
}
</script>
{{end}}
