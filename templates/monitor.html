{{template "base" .}}
{{define "monitor_content"}}
<div x-data="monitorPage()" x-init="fetch()" class="p-6">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-purple-300">性能监控</h2>
        <div class="text-xs text-gray-500" x-text="lastUpdate ? '更新于 ' + lastUpdate : ''"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4" id="server-cards">
        <template x-for="s in servers" :key="s.id">
            <a :href="'monitor/'+s.id" class="card hover:border-purple-500/50 transition-colors block">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-2">
                        <span :class="s.is_online ? 'text-green-400' : 'text-red-400'" class="text-lg" x-text="s.is_online ? '●' : '○'"></span>
                        <span class="font-medium text-white" x-text="s.name"></span>
                    </div>
                    <span class="badge-info text-xs" x-text="s.agent_version || '--'"></span>
                </div>
                <div class="text-xs text-gray-400 mb-3" x-text="s.ip_address"></div>

                <div class="space-y-2 text-sm">
                    <div class="flex items-center justify-between">
                        <span class="text-gray-400">CPU</span>
                        <div class="flex items-center gap-2">
                            <div class="w-20 bg-gray-700 rounded-full h-1.5"><div class="bg-purple-500 rounded-full h-1.5" :style="'width:'+(s.cpu_percent||0)+'%'"></div></div>
                            <span class="text-gray-200 w-14 text-right" x-text="(s.cpu_percent||0).toFixed(1)+'%'"></span>
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-gray-400">内存</span>
                        <div class="flex items-center gap-2">
                            <div class="w-20 bg-gray-700 rounded-full h-1.5"><div class="bg-green-500 rounded-full h-1.5" :style="'width:'+(s.memory_percent||0)+'%'"></div></div>
                            <span class="text-gray-200 w-14 text-right" x-text="(s.memory_percent||0).toFixed(1)+'%'"></span>
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-gray-400">磁盘</span>
                        <div class="flex items-center gap-2">
                            <div class="w-20 bg-gray-700 rounded-full h-1.5"><div class="bg-yellow-500 rounded-full h-1.5" :style="'width:'+(s.disk_percent||0)+'%'"></div></div>
                            <span class="text-gray-200 w-14 text-right" x-text="(s.disk_percent||0).toFixed(1)+'%'"></span>
                        </div>
                    </div>
                    <div class="flex items-center justify-between text-xs">
                        <span class="text-gray-500">负载</span>
                        <span class="text-gray-400" x-text="(s.load_avg_1||0).toFixed(2)"></span>
                    </div>
                    <div class="flex items-center justify-between text-xs">
                        <span class="text-gray-500">在线</span>
                        <span class="text-gray-400" x-text="formatUptime(s.uptime_seconds||0)"></span>
                    </div>
                </div>
            </a>
        </template>
    </div>

    <div class="text-center text-gray-500 py-12" x-show="!loading && servers.length==0">
        暂无服务器性能数据。<br>请为服务器安装 Agent 探针后刷新。
    </div>
</div>
<script>
function monitorPage() {
    return {
        servers: [], loading: true, lastUpdate: '',
        async fetch() {
            this.loading = true;
            try {
                const d = await api('/api/monitor/overview');
                this.servers = d.data || [];
                this.lastUpdate = new Date().toLocaleTimeString('zh-CN');
            } catch(e) {}
            this.loading = false;
        }
    }
}
</script>
{{end}}
